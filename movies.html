<!DOCTYPE html>
<html>
    <head>
        <title>Movies</title>

        <style>
            h1 {
                font-size: 45px;
                text-align: center;
            }
            p {
                color: white;
                font-size: 20px;
                text-align: center;
            }

            table {
                border-collapse: collapse;
                margin-left: auto;
                margin-right: auto;
            }

            th, td {
                border: 2px solid black;
                padding: 30px;
                text-align: center;
            }

            #link {
                text-align: center;
                margin-bottom: 10px;
            }
            
        </style>

        <script>
            function randomColor() {
                if (window.localStorage.getItem("cart") == null) {
                    window.localStorage.setItem("cart", "[]")
                }
                var body = document.getElementsByTagName('body')[0]
                var r = Math.random()*255
                var g = Math.random()*255
                var b = Math.random()*255
                body.style['background-color'] = "rgb("+r+", "+g+", "+b+")"
            }
        </script>
    </head>

    <body onload="randomColor(); buildTable()">
        <h1>Welcome to Blockbuster!</h1>
        <p>Here is our list of movies:</p>
        <div id="link">
            <a href="/order" style="font-size: 20px">Proceed to Checkout</a>
        </div>
        

        <table>
            <tr>
                <th>Action</th>
                <th>Fantasy</th>
                <th>Sci-Fi</th>
            </tr>
        </table>

        <script>
            function buildTable() {
                fetch('/movies-json')
                .then(function(res) {
                    return res.json()
                })
                .then(function(movies) {
                    var table = document.getElementsByTagName('table')[0]
                    var tr = document.createElement('tr')
                    var td = document.createElement('td')
                    var i = 0

                    for (i = 0; i <= 2; i++) {
                        td = document.createElement('td')
                        td.innerHTML = `
                        <img src="${movies[i].image}"
                             alt="${movies[i].title}"
                             width="200px"
                             height="300px">
                        <p>${movies[i].title} : ${movies[i].price}</p>
                        <button type="button" onclick="addToCart('${movies[i].title}')">Add to Cart</button>
                        `
                        tr.appendChild(td)
                    }
                    table.appendChild(tr)

                    tr = document.createElement('tr')
                    for (i = 3; i <= 5; i++) {
                        td = document.createElement('td')
                        td.innerHTML = `
                        <img src="${movies[i].image}"
                             alt="${movies[i].title}"
                             width="200px"
                             height="300px">
                        <p>${movies[i].title} : ${movies[i].price}</p>
                        <button type="button" onclick="addToCart('${movies[i].title}')">Add to Cart</button>
                        `
                        tr.appendChild(td)
                    }
                    table.appendChild(tr)

                    tr = document.createElement('tr')
                    for (i = 6; i <= 8; i++) {
                        td = document.createElement('td')
                        td.innerHTML = `
                        <img src="${movies[i].image}"
                             alt="${movies[i].title}"
                             width="200px"
                             height="300px">
                        <p>${movies[i].title} : ${movies[i].price}</p>
                        <button type="button" onclick="addToCart('${movies[i].title}')">Add to Cart</button>
                        `
                        tr.appendChild(td)
                    }
                    table.appendChild(tr)
                })
                .catch(function(err) {
                    console.log(err)
                })
            }
            

            function addToCart(movie) {
                var cart = JSON.parse(localStorage.getItem("cart"))
                cart.push(movie)
                cart = JSON.stringify(cart)
                console.log(cart)
                localStorage.setItem("cart", cart)
            }
        </script>
    </body>
</html>
